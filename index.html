<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL RATION LOG</title>
    <style>
        /* ธีมทหาร: พื้นหลังสีเขียวน้ำทะเล และ สีม่วงพิษ (Poison Purple) */
        body {
            background-color: #2F4F4F; 
            color: #FFFFFF;
            font-family: "Courier New", Courier, monospace;
            text-transform: uppercase;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            border-bottom: 2px solid #9D00FF; /* เปลี่ยนเป็นสีม่วงพิษ */
            padding-bottom: 10px;
            color: #FFFFFF;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #223322;
            padding: 20px;
            border: 2px solid #9D00FF; /* กรอบสีม่วงพิษ */
            border-radius: 5px;
        }

        .date-display {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #9D00FF; /* สีม่วงพิษ */
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="time"],
        select,
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #1A2B1A;
            color: #FFFFFF;
            border: 1px solid #9D00FF; /* ขอบสีม่วงพิษ */
            font-family: "Courier New", Courier, monospace;
            font-size: 16px; 
            box-sizing: border-box;
            text-transform: uppercase;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4B5320; 
            color: #FFFFFF;
            border: 3px solid #9D00FF; /* ขอบปุ่มสีม่วงพิษ */
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:active {
            background-color: #9D00FF;
            color: #FFFFFF;
        }

        .log-section {
            margin-top: 30px;
            overflow-x: auto; /* เผื่อตารางกว้างเกินจอ */
        }

        /* ตั้งค่าตาราง */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table, th, td {
            border: 1px solid #9D00FF; /* เส้นตารางสีม่วงพิษ */
        }

        th {
            background-color: #9D00FF; /* หัวตารางสีม่วงพิษ */
            color: #FFFFFF;
            padding: 10px;
            text-align: center;
        }

        td {
            background-color: #1A2B1A;
            padding: 10px;
            text-align: left;
            font-size: 15px;
        }
        
        /* จัดข้อความตรงกลางสำหรับคอลัมน์เวลาและประเภท */
        td.col-time, td.col-type {
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TACTICAL RATION LOG</h1>
        
        <div id="current-date" class="date-display">LOADING DATE...</div>

        <div class="form-group">
            <label for="time">TIME (HOURS):</label>
            <input type="time" id="time" required>
        </div>

        <div class="form-group">
            <label for="type">CATEGORY:</label>
            <select id="type">
                <option value="FOOD">FOOD</option>
                <option value="DRINK">DRINK</option>
            </select>
        </div>

        <div class="form-group">
            <label for="desc">DESCRIPTION:</label>
            <input type="text" id="desc" placeholder="ENTER DETAILS (E.G. REDBULL)..." autocomplete="off">
        </div>

        <button type="button" onclick="saveLog()">LOG ENTRY</button>

        <div class="log-section">
            <h2>DAILY LOGS</h2>
            <table>
                <thead>
                    <tr>
                        <th>TIME</th>
                        <th>CAT</th>
                        <th>DESCRIPTION</th>
                    </tr>
                </thead>
                <tbody id="log-tbody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ใช้ตัวแปรสำรองในกรณีที่ iOS 9 บล็อก LocalStorage (เช่น โหมด Private)
        var memoryFallbackLogs = [];

        function displayCurrentDate() {
            var dateDisplay = document.getElementById('current-date');
            var today = new Date();
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateDisplay.innerText = today.toLocaleDateString('en-US', options).toUpperCase();
        }

        function getTodayKey() {
            return 'rationLogs_' + new Date().toDateString();
        }

        function getLogs() {
            var todayKey = getTodayKey();
            try {
                var savedLogs = localStorage.getItem(todayKey);
                if (savedLogs) {
                    return JSON.parse(savedLogs);
                }
            } catch (e) {
                // ถ้ามี Error (เช่น Private Mode) ให้ดึงจากหน่วยความจำชั่วคราวแทน
                return memoryFallbackLogs;
            }
            return [];
        }

        function loadLogs() {
            var tbody = document.getElementById('log-tbody');
            tbody.innerHTML = ''; 
            
            var logs = getLogs();

            for (var i = 0; i < logs.length; i++) {
                var tr = document.createElement('tr');
                
                var tdTime = document.createElement('td');
                tdTime.className = 'col-time';
                tdTime.innerText = logs[i].time;
                
                var tdType = document.createElement('td');
                tdType.className = 'col-type';
                tdType.innerText = logs[i].type;
                
                var tdDesc = document.createElement('td');
                tdDesc.innerText = logs[i].desc;
                
                tr.appendChild(tdTime);
                tr.appendChild(tdType);
                tr.appendChild(tdDesc);
                
                tbody.appendChild(tr);
            }
        }

        function saveLog() {
            var timeInput = document.getElementById('time').value;
            var typeInput = document.getElementById('type').value;
            var descInput = document.getElementById('desc').value;

            if (timeInput === '' || descInput === '') {
                alert('PLEASE FILL IN DESCRIPTION.');
                return;
            }

            var newEntry = {
                time: timeInput,
                type: typeInput,
                desc: descInput.toUpperCase()
            };

            var logs = getLogs();
            logs.push(newEntry);
            
            // เรียงเวลาจากน้อยไปมาก
            logs.sort(function(a, b) {
                return a.time.localeCompare(b.time);
            });

            var todayKey = getTodayKey();
            
            try {
                localStorage.setItem(todayKey, JSON.stringify(logs));
                memoryFallbackLogs = logs; // สำรองข้อมูลไว้
            } catch (e) {
                // หาก LocalStorage บันทึกไม่ได้ ให้บันทึกลงตัวแปรสำรอง
                memoryFallbackLogs = logs;
            }

            // ล้างช่องใส่ข้อความ
            document.getElementById('desc').value = '';
            
            // อัปเดตตารางทันที
            loadLogs();
        }

        function setCurrentTime() {
            var now = new Date();
            var hours = String(now.getHours());
            if (hours.length < 2) hours = '0' + hours;
            var minutes = String(now.getMinutes());
            if (minutes.length < 2) minutes = '0' + minutes;
            document.getElementById('time').value = hours + ':' + minutes;
        }

        window.onload = function() {
            displayCurrentDate();
            setCurrentTime();
            loadLogs();
        };
    </script>
</body>
</html>
