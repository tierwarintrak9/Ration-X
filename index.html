<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGHTYEARX-MOTOREX V5.5B3</title>
    <style>
        body { background-color: #000500; color: #00FF33; font-family: "Courier New", monospace; text-transform: uppercase; padding: 10px; margin: 0; background-image: linear-gradient(rgba(0, 50, 0, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 50, 0, 0.1) 1px, transparent 1px); background-size: 20px 20px; }
        
        /* เพิ่มเอฟเฟกต์หน้าจอ CRT */
        body::after { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 99999; background-size: 100% 4px, 3px 100%; pointer-events: none; }

        .box { width: 100%; max-width: 500px; margin: 0 auto; background-color: rgba(0, 8, 0, 0.9); padding: 15px; border: 2px solid #00FF33; position: relative; box-shadow: 0 0 15px rgba(0, 255, 51, 0.2); box-sizing: border-box; }
        
        .box::before { content: "[ OPERATIONAL HUD ]"; position: absolute; top: -10px; left: 15px; background: #000500; padding: 0 5px; font-size: 10px; color: #00FF33; letter-spacing: 2px; }

        h1 { text-align: center; color: #00FF33; margin: 10px 0; border-bottom: 2px dashed #00FF33; padding-bottom: 5px; font-size: 20px; overflow: hidden; white-space: nowrap; border-right: 2px solid #00FF33; animation: typing 2s steps(30, end), blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00FF33 } }

        .status-bar { width: 100%; font-size: 11px; color: #00AA22; border-bottom: 1px solid #00FF33; padding-bottom: 6px; margin-bottom: 12px; }
        .status-right { float: right; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
        
        input, select { width: 100%; padding: 8px; background-color: #000000; color: #00FF33; border: 1px solid #00AA22; font-family: "Courier New", monospace; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background-color: #002200; color: #00FF33; border: 2px solid #00FF33; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { background-color: #00FF33; color: #000; transform: scale(0.98); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; transition: background 0.5s; }
        th, td { border: 1px solid #00AA22; padding: 8px; text-align: center; font-size: 13px; color: #00FF33; }
        .flash-effect { background-color: rgba(0, 255, 51, 0.3) !important; }
    </style>
</head>
<body>
    <div class="box">
        <div class="status-bar">
            <div class="status-left" style="float:left">SYS.LOG // V5.5B2</div>
            <div class="status-right">● ONLINE</div>
            <div style="clear:both;"></div>
        </div>

        <h1>TACTICAL-COMS_RATION</h1>
        <div id="date-text" style="text-align:center; font-size:12px; margin-bottom:10px;"></div>
        
        <!-- ส่วน Input เดิมของคุณ -->
        <input type="text" id="tx-time" style="margin-bottom:5px;">
        <select id="tx-type" style="margin-bottom:5px;"><option value="FOOD">FOOD</option><option value="DRINK">DRINK</option></select>
        <input type="text" id="tx-desc" placeholder="AWAITING INPUT..." style="margin-bottom:10px;">
        
        <button type="button" class="btn-main" onclick="addData()">EXECUTE ENTRY</button>

        <h2>MONITOR LOGS</h2>
        <table id="log-table">
            <thead><tr><th>TIME</th><th>IDENT</th><th>DATA</th><th>TERM</th></tr></thead>
            <tbody id="log-table-body"></tbody>
        </table>
    </div>

    <script>
        var listData = JSON.parse(localStorage.getItem("mil_log_data_v5") || "[]");

        function addData() {
            var t = document.getElementById("tx-time").value;
            var type = document.getElementById("tx-type").value;
            var desc = document.getElementById("tx-desc").value;
            listData.push({time: t, type: type, desc: desc.toUpperCase()});
            localStorage.setItem("mil_log_data_v5", JSON.stringify(listData));
            
            // เอฟเฟกต์กระพริบเมื่อกดบันทึก
            var table = document.getElementById("log-table");
            table.classList.add("flash-effect");
            setTimeout(() => { table.classList.remove("flash-effect"); }, 300);
            
            refreshTable();
        }

        function refreshTable() {
            var html = "";
            listData.forEach((item, i) => {
                html += "<tr><td>"+item.time+"</td><td>"+item.type+"</td><td>"+item.desc+"</td><td><button onclick='del("+i+")'>X</button></td></tr>";
            });
            document.getElementById("log-table-body").innerHTML = html;
        }

        function del(i) { listData.splice(i, 1); localStorage.setItem("mil_log_data_v5", JSON.stringify(listData)); refreshTable(); }
        
        window.onload = function() { 
            refreshTable(); 
            document.getElementById("date-text").innerHTML = "INDEX: " + new Date().toDateString().toUpperCase();
            document.getElementById("tx-time").value = new Date().getHours() + ":" + new Date().getMinutes();
        }
    </script>
</body>
</html>
