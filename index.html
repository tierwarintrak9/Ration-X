<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL RATION LOG</title>
    <style>
        /* ธีมทหารสีเขียวน้ำทะเล + สีม่วงพิษ (Poison Purple) */
        body {
            background-color: #2F4F4F; 
            color: #FFFFFF;
            font-family: "Courier New", Courier, monospace;
            text-transform: uppercase;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            border-bottom: 3px solid #9D00FF; 
            padding-bottom: 10px;
            color: #FFFFFF;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #223322;
            padding: 20px;
            border: 2px solid #9D00FF; 
            border-radius: 5px;
        }

        .date-display {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #9D00FF; 
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* ใช้ฟอนต์ 16px เพื่อไม่ให้ iOS Zoom หน้าจอเอง */
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            background-color: #1A2B1A;
            color: #FFFFFF;
            border: 1px solid #9D00FF; 
            font-family: "Courier New", Courier, monospace;
            font-size: 16px; 
            box-sizing: border-box;
            text-transform: uppercase;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4B5320; 
            color: #FFFFFF;
            border: 3px solid #9D00FF; 
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:active {
            background-color: #9D00FF;
            color: #FFFFFF;
        }

        .log-section {
            margin-top: 30px;
        }

        /* ตารางสไตล์ทหาร */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table, th, td {
            border: 2px solid #9D00FF; 
        }

        th {
            background-color: #9D00FF; 
            color: #FFFFFF;
            padding: 10px;
            font-size: 14px;
        }

        td {
            background-color: #1A2B1A;
            padding: 10px;
            font-size: 14px;
            word-break: break-all;
        }
        
        .col-time, .col-type {
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TACTICAL RATION LOG</h1>
        
        <div id="current-date" class="date-display">LOADING DATE...</div>

        <div class="form-group">
            <label for="time">TIME (HH:MM):</label>
            <input type="text" id="time" placeholder="E.G. 14:30" required>
        </div>

        <div class="form-group">
            <label for="type">CATEGORY:</label>
            <select id="type">
                <option value="FOOD">FOOD</option>
                <option value="DRINK">DRINK</option>
            </select>
        </div>

        <div class="form-group">
            <label for="desc">DESCRIPTION:</label>
            <input type="text" id="desc" placeholder="ENTER DETAILS (E.G. REDBULL)" autocomplete="off">
        </div>

        <button type="button" id="log-btn">LOG ENTRY</button>

        <div class="log-section">
            <h2>DAILY LOGS</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 20%;">TIME</th>
                        <th style="width: 25%;">CAT</th>
                        <th style="width: 55%;">DESCRIPTION</th>
                    </tr>
                </thead>
                <tbody id="log-tbody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ใช้ตัวแปร Global แบบดั้งเดิมทั้งหมดเพื่อความเสถียรบน iOS 9
        var globalLogs = [];

        window.onload = function() {
            // 1. จัดการแสดงผลวันที่แบบดั้งเดิม (ไม่ใช้คำสั่งยุคใหม่ที่ทำ Safari iOS 9 เอ๋อ)
            try {
                var days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
                var months = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
                var today = new Date();
                var dateString = days[today.getDay()] + ', ' + months[today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear();
                document.getElementById('current-date').innerHTML = dateString;
            } catch(e) {
                document.getElementById('current-date').innerHTML = "DATE ERROR";
            }

            // 2. ตั้งค่าเวลาปัจจุบันลงในช่องกรอกให้อัตโนมัติ
            try {
                var now = new Date();
                var hh = now.getHours();
                var mm = now.getMinutes();
                if (hh < 10) hh = '0' + hh;
                if (mm < 10) mm = '0' + mm;
                document.getElementById('time').value = hh + ':' + mm;
            } catch(e) {}

            // 3. ผูกคำสั่งปุ่มกดบันทึกผ่าน Event Listener ระดับรากฐาน
            var btn = document.getElementById('log-btn');
            if(btn) {
                btn.onclick = function() {
                    saveLogData();
                };
            }

            // 4. โหลดข้อมูลเก่าที่เคยบันทึกไว้ขึ้นมาแสดงในตาราง
            initLogData();
        };

        function initLogData() {
            try {
                var todayKey = 'ration_' + new Date().toDateString();
                var saved = localStorage.getItem(todayKey);
                if (saved) {
                    globalLogs = JSON.parse(saved);
                }
            } catch(e) {
                // ป้องกันกรณีเปิดโหมดส่วนตัว (Private Browsing) ไว้
            }
            renderLogTable();
        }

        function renderLogTable() {
            var tbody = document.getElementById('log-tbody');
            if(!tbody) return;
            
            tbody.innerHTML = ''; // ล้างตารางเดิมก่อนวาดใหม่

            for (var i = 0; i < globalLogs.length; i++) {
                var row = tbody.insertRow(-1); // เพิ่มแถวใหม่ต่อท้าย
                
                var cellTime = row.insertCell(0);
                var cellType = row.insertCell(1);
                var cellDesc = row.insertCell(2);
                
                cellTime.className = 'col-time';
                cellType.className = 'col-type';
                
                cellTime.innerHTML = globalLogs[i].time;
                cellType.innerHTML = globalLogs[i].type;
                cellDesc.innerHTML = globalLogs[i].desc;
            }
        }

        function saveLogData() {
            var timeVal = document.getElementById('time').value;
            var typeVal = document.getElementById('type').value;
            var descVal = document.getElementById('desc').value;

            if (timeVal === '' || descVal === '') {
                alert('CRITICAL: PLEASE FILL IN ALL FIELDS.');
                return;
            }

            // สร้างก้อนข้อมูลใหม่
            var newEntry = {
                time: timeVal,
                type: typeVal,
                desc: descVal.toUpperCase()
            };

            globalLogs.push(newEntry);

            // จัดเรียงเวลาในตารางจากเช้าไปเย็นด้วยคำสั่งพื้นฐาน
            globalLogs.sort(function(a, b) {
                return a.time.localeCompare(b.time);
            });

            // พยายามเซฟลงเครื่อง ถ้าติดโหมดส่วนตัวจะข้ามไป แต่ตารางบนหน้าจอยังอัปเดตให้เห็นชั่วคราว
            try {
                var todayKey = 'ration_' + new Date().toDateString();
                localStorage.setItem(todayKey, JSON.stringify(globalLogs));
            } catch(e) {}

            // เคลียร์ช่องรายละเอียดหลังบันทึกเสร็จ
            document.getElementById('desc').value = '';
            
            // สั่งอัปเดตตารางผลลัพธ์ทันที
            renderLogTable();
        }
    </script>
</body>
</html>
