<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL LOG V2</title>
    <style>
        body { 
            background-color: #2F4F4F; 
            color: #FFFFFF; 
            font-family: "Courier New", monospace; 
            text-transform: uppercase; 
            padding: 15px; 
            margin: 0; 
        }
        .box { 
            max-width: 500px; 
            margin: 0 auto; 
            background-color: #1A2B1A; 
            padding: 15px; 
            border: 3px solid #9D00FF; 
            border-radius: 4px; 
        }
        h1, h2 { 
            text-align: center; 
            color: #FFFFFF; 
            margin: 10px 0; 
            border-bottom: 2px solid #9D00FF; 
            padding-bottom: 5px; 
        }
        .status-bar {
            text-align: justify;
            font-size: 11px;
            color: #888888;
            border-bottom: 1px dashed #9D00FF;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .date { 
            text-align: center; 
            color: #9D00FF; 
            font-weight: bold; 
            margin-bottom: 15px; 
            font-size: 18px;
        }
        .field { 
            margin-bottom: 12px; 
        }
        label { 
            display: block; 
            margin-bottom: 4px; 
            font-weight: bold; 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            background-color: #000000; 
            color: #FFFFFF; 
            border: 1px solid #9D00FF; 
            font-family: "Courier New", monospace; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        
        .preset-container {
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .btn-preset {
            display: inline-block;
            padding: 5px 8px;
            background-color: #112211;
            color: #9D00FF;
            border: 1px solid #9D00FF;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .btn-preset:active {
            background-color: #9D00FF;
            color: #000000;
        }

        button.btn-main { 
            width: 100%; 
            padding: 14px; 
            background-color: #4B5320; 
            color: #FFFFFF; 
            border: 3px solid #9D00FF; 
            font-family: "Courier New", monospace; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 5px; 
            text-transform: uppercase; 
        }
        button.btn-main:active { 
            background-color: #9D00FF; 
            color: #FFFFFF;
        }
        
        .summary-box {
            background-color: #051505;
            border: 1px solid #9D00FF;
            padding: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #9D00FF;
            font-weight: bold;
            text-align: center;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            border: 1px solid #9D00FF; 
            padding: 8px; 
            text-align: left; 
            font-size: 14px; 
        }
        th { 
            background-color: #9D00FF; 
            color: #FFFFFF; 
            text-align: center; 
        }
        .btn-del {
            background-color: #330000;
            color: #FF3333;
            border: 1px solid #FF3333;
            font-family: "Courier New", monospace;
            font-weight: bold;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-del:active {
            background-color: #FF3333;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="status-bar">
            <span style="float:left;">LIGHTYEARX-MOTOREX_BIONIC 2.0</span>
            <span style="float:right; color:#00FF00;">[STATUS: SECURE]</span>
            <div style="clear:both;"></div>
        </div>

        <h1>TACTICAL RATION LOG</h1>
        <div id="date-text" class="date">LOADING...</div>
        
        <div class="field">
            <label>TIME (HH:MM):</label>
            <input type="text" id="tx-time" value="00:00">
        </div>
        <div class="field">
            <label>CATEGORY:</label>
            <select id="tx-type">
                <option value="FOOD">FOOD</option>
                <option value="DRINK">DRINK</option>
            </select>
        </div>
        <div class="field">
            <label>DESCRIPTION:</label>
            <input type="text" id="tx-desc" placeholder="ENTER RATION">
            
            <div class="preset-container">
                <div class="btn-preset" onclick="setPreset('WATER', 'DRINK')">+ WATER</div>
                <div class="btn-preset" onclick="setPreset('COFFEE', 'DRINK')">+ COFFEE</div>
                <div class="btn-preset" onclick="setPreset('MRE RATION', 'FOOD')">+ MRE</div>
                <div class="btn-preset" onclick="setPreset('SNACK', 'FOOD')">+ SNACK</div>
            </div>
        </div>
        
        <button type="button" class="btn-main" onclick="addData()">LOG ENTRY</button>
        
        <div class="summary-box" id="summary-text">
            TOTAL RATIONS: FOOD [0] | DRINK [0]
        </div>

        <h2>DAILY LOGS</h2>
        <table>
            <thead>
                <tr>
                    <th style="width:20%">TIME</th>
                    <th style="width:20%">CAT</th>
                    <th>DETAILS</th>
                    <th style="width:12%">ACT</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                </tbody>
        </table>
    </div>

    <script>
        var listData = [];

        window.onload = function() {
            var d = new Date();
            var days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
            var months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            document.getElementById("date-text").innerHTML = days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();

            resetTimeToCurrent();

            try {
                var cache = localStorage.getItem("mil_log_data_v2");
                if(cache) {
                    listData = JSON.parse(cache);
                    refreshTable();
                }
            } catch(e) {}
        };

        function setPreset(text, cat) {
            document.getElementById("tx-desc").value = text;
            document.getElementById("tx-type").value = cat;
        }

        function resetTimeToCurrent() {
            var d = new Date();
            var hr = d.getHours();
            var min = d.getMinutes();
            if(hr < 10) hr = "0" + hr;
            if(min < 10) min = "0" + min;
            document.getElementById("tx-time").value = hr + ":" + min;
        }

        function addData() {
            var t = document.getElementById("tx-time").value;
            var type = document.getElementById("tx-type").value;
            var desc = document.getElementById("tx-desc").value;

            if(t == "" || desc == "") {
                alert("ENTER ALL DETAILS FIRST!");
                return;
            }

            listData.push({
                time: t,
                type: type,
                desc: desc.toUpperCase()
            });

            listData.sort(function(a, b) {
                return a.time.localeCompare(b.time);
            });

            saveToStorage();
            document.getElementById("tx-desc").value = "";
            resetTimeToCurrent();
            refreshTable();
        }

        function deleteData(index) {
            if(confirm("CONFIRM DELETION OF THIS ENTRY?")) {
                listData.splice(index, 1);
                saveToStorage();
                refreshTable();
            }
        }

        function saveToStorage() {
            try {
                localStorage.setItem("mil_log_data_v2", JSON.stringify(listData));
            } catch(e) {}
        }

        function refreshTable() {
            var html = "";
            var foodCount = 0;
            var drinkCount = 0;

            for(var i = 0; i < listData.length; i++) {
                if(listData[i].type === "FOOD") foodCount++;
                if(listData[i].type === "DRINK") drinkCount++;

                html += "<tr>";
                html += "<td style='text-align:center; font-weight:bold;'>" + listData[i].time + "</td>";
                html += "<td style='text-align:center; font-weight:bold;'>" + listData[i].type + "</td>";
                html += "<td>" + listData[i].desc + "</td>";
                html += "<td style='text-align:center;'><button class='btn-del' onclick='deleteData(" + i + ")'>X</button></td>";
                html += "</tr>";
            }
            
            document.getElementById("log-table-body").innerHTML = html;
            document.getElementById("summary-text").innerHTML = "TOTAL RATIONS: FOOD [" + foodCount + "] | DRINK [" + drinkCount + "]";
        }
    </script>
</body>
</html>
