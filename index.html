<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGHTYEARX-MOTOREX V5</title>
    <style>
        /* TACTICAL HACKER & MILITARY TERMINAL HUD */
        body { 
            background-color: #000500; 
            color: #00FF33; 
            font-family: "Courier New", monospace; 
            text-transform: uppercase; 
            padding: 10px; 
            margin: 0;
            background-image: linear-gradient(rgba(0, 50, 0, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 50, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

    body::after {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        z-index: 99999;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
    }

    .box { 
        max-width: 500px; 
        margin: 0 auto; 
        background-color: rgba(0, 8, 0, 0.9); 
        padding: 15px; 
        border: 2px solid #00FF33; 
        position: relative;
        box-shadow: 0 0 15px rgba(0, 255, 51, 0.2);
    }
    
    .box::before {
        content: "[ OPERATIONAL HUD ]";
        position: absolute;
        top: -10px;
        left: 15px;
        background: #000500;
        padding: 0 5px;
        font-size: 10px;
        color: #00FF33;
        letter-spacing: 2px;
    }

    h1, h2 { 
        text-align: center; 
        color: #00FF33; 
        margin: 10px 0; 
        border-bottom: 2px dashed #00FF33; 
        padding-bottom: 5px; 
        font-size: 20px;
        letter-spacing: 1px;
        text-shadow: 0 0 5px rgba(0, 255, 51, 0.5);
    }
    
    .status-bar {
        width: 100%;
        font-size: 11px;
        color: #00AA22;
        border-bottom: 1px solid #00FF33;
        padding-bottom: 6px;
        margin-bottom: 12px;
    }
    .status-left { float: left; width: 70%; font-weight: bold; }
    .status-right { float: right; width: 30%; text-align: right; color: #00FF33; font-weight: bold; animation: blink 1.5s infinite; }
    
    @keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
    
    .date { text-align: center; color: #00FF33; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
    .field { margin-bottom: 14px; border-left: 3px solid #00AA22; padding-left: 8px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; color: #00AA22; font-size: 12px; }
    
    .time-row { display: table; width: 100%; }
    .time-cell-input { display: table-cell; width: 35%; }
    .time-cell-btns { display: table-cell; width: 65%; text-align: right; vertical-align: middle; }
    
    input, select { 
        width: 100%; 
        padding: 8px; 
        background-color: #000000; 
        color: #00FF33; 
        border: 1px solid #00AA22; 
        font-family: "Courier New", monospace; 
        font-size: 16px; 
        box-sizing: border-box;
        /* ตัดสีพื้นหลังตัวเลือกออก */
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
    }

    /* สำหรับ Option ใน select ให้เป็นสีดำ */
    select option { background-color: #000; color: #00FF33; }

    .preset-container { margin-top: 5px; margin-bottom: 5px; }
    .btn-preset {
        display: inline-block;
        padding: 5px 8px;
        background-color: #001100;
        color: #00FF33;
        border: 1px solid #00AA22;
        font-size: 11px;
        font-weight: bold;
        margin-right: 3px;
        margin-bottom: 5px;
        cursor: pointer;
    }
    .btn-preset:active { background-color: #00FF33; color: #000000; }

    button.btn-main { 
        width: 100%; 
        padding: 12px; 
        background-color: #002200; 
        color: #00FF33; 
        border: 2px solid #00FF33; 
        font-family: "Courier New", monospace; 
        font-size: 16px; 
        font-weight: bold; 
        margin-top: 5px; 
        text-transform: uppercase; 
        cursor: pointer;
        box-shadow: inset 0 0 5px rgba(0,255,51,0.3);
    }
    button.btn-main:active { background-color: #00FF33; color: #000000; }
    
    .summary-box { background-color: #001100; border: 1px dashed #00FF33; padding: 8px; margin-top: 15px; font-size: 12px; color: #00FF33; font-weight: bold; text-align: center; }
    .filter-container { text-align: center; margin-top: 12px; margin-bottom: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 5px; }
    th, td { border: 1px solid #00AA22; padding: 8px; text-align: left; font-size: 13px; }
    th { background-color: #002200; color: #00FF33; text-align: center; }
    td { background-color: #000000; color: #00FF33; }
    
    .btn-del { background-color: #220000; color: #FF3333; border: 1px solid #FF3333; font-family: "Courier New", monospace; font-weight: bold; padding: 2px 6px; cursor: pointer; }
    
    .control-zone { margin-top: 20px; border-top: 2px double #00FF33; padding-top: 15px; }
    .btn-danger { background-color: #220000; color: #FF3333; border: 1px solid #FF3333; padding: 10px; font-family: "Courier New", monospace; font-weight: bold; font-size: 12px; cursor: pointer; width: 48%; float: left; }
    .btn-danger:active { background-color: #FF3333; color: #000000; }
    
    .btn-utility { background-color: #001122; color: #3399FF; border: 1px solid #3399FF; padding: 10px; font-family: "Courier New", monospace; font-weight: bold; font-size: 12px; cursor: pointer; width: 48%; float: right; }
    .btn-utility:active { background-color: #3399FF; color: #000000; }

    .export-area { width: 100%; height: 90px; background-color: #000000; color: #00FF33; border: 1px dashed #00FF33; font-family: "Courier New", monospace; font-size: 11px; margin-top: 10px; padding: 5px; box-sizing: border-box; display: none; }
</style>
</head>
<body>
    <div class="box">
        <div class="status-bar">
            <div class="status-left">SYS.LOG // LIGHTYEARX-MOTOREX_BIONIC 5.5B2</div>
            <div class="status-right">● ONLINE</div>
            <div class="status-middle">● [+66]THAILAND</div>
            <div style="clear:both;"></div>
        </div>

    <h1>TACTICAL-COMS_RATION.LOG</h1>
    <div id="date-text" class="date">LOADING INDEX...</div>
    
    <div class="field">
        <label>[SYS.TIME] // INPUT CURRENT TIME</label>
        <div class="time-row">
            <div class="time-cell-input"><input type="text" id="tx-time" value="00:00"></div>
            <div class="time-cell-btns">
                <div class="btn-preset" onclick="modifyTime(-10)">-10M</div>
                <div class="btn-preset" onclick="modifyTime(-5)">-5M</div>
                <div class="btn-preset" onclick="modifyTime(5)">+5M</div>
                <div class="btn-preset" onclick="modifyTime(10)">+10M</div>
            </div>
        </div>
    </div>
    
    <div class="field">
        <label>[SYS.CAT] // SELECT DATA CATEGORY</label>
        <select id="tx-type">
            <option value="FOOD">FOOD (SUPPLY)</option>
            <option value="DRINK">DRINK (HYDRATION)</option>
        </select>
    </div>
    
    <div class="field">
        <label>[SYS.DESC] // ENTER FIELD DETAILS</label>
        <input type="text" id="tx-desc" placeholder="AWAITING INPUT...">
        <div class="preset-container">
            <div class="btn-preset" onclick="setPreset('WATER', 'DRINK')">+ WATER</div>
            <div class="btn-preset" onclick="setPreset('COFFEE', 'DRINK')">+ COFFEE</div>
            <div class="btn-preset" onclick="setPreset('MRE RATION', 'FOOD')">+ MRE</div>
            <div class="btn-preset" onclick="setPreset('SNACK', 'FOOD')">+ SNACK</div>
        </div>
    </div>
    
    <button type="button" class="btn-main" onclick="addData()">EXECUTE LOG ENTRY</button>
    
    <div class="summary-box" id="summary-text">COUNTER // FOOD_UNIT: [0] | DRINK_UNIT: [0]</div>

    <div class="filter-container">
        <span style="font-size:11px; font-weight:bold; margin-right:5px; color:#00AA22;">DISPLAY_FILTER:</span>
        <div class="btn-preset" id="f-all" onclick="setFilter('ALL')" style="color:#000; background:#00FF33;">[ALL]</div>
        <div class="btn-preset" id="f-food" onclick="setFilter('FOOD')">[FOOD]</div>
        <div class="btn-preset" id="f-drink" onclick="setFilter('DRINK')">[DRINK]</div>
    </div>

    <h2>DAILY MONITOR LOGS</h2>
    <table>
        <thead><tr><th style="width:20%">TIMESTAMP</th><th style="width:25%">IDENT</th><th>DECRYPTED_DATA</th><th style="width:12%">TERM</th></tr></thead>
        <tbody id="log-table-body"></tbody>
    </table>

    <div class="control-zone">
        <button type="button" class="btn-danger" onclick="nuclearReset()">CORE WIPEOUT</button>
        <button type="button" class="btn-utility" onclick="toggleExport()">DUMP DATALOG</button>
        <div style="clear:both;"></div>
        <textarea id="export-output" class="export-area" readonly></textarea>
    </div>
</div>

<script>
        var listData = [];
    var currentFilter = "ALL";

    window.onload = function() {
        var d = new Date();
        var days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        var months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
        document.getElementById("date-text").innerHTML = "INDEX: " + days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
        
        // โหลดข้อมูลจาก storage
        var cache = localStorage.getItem("mil_log_data_v5");
        if(cache) {
            listData = JSON.parse(cache);
        }
        
        resetTimeToCurrent();
        refreshTable();
    };

    function setPreset(text, cat) { 
        document.getElementById("tx-desc").value = text; 
        document.getElementById("tx-type").value = cat; 
    }

    function resetTimeToCurrent() {
        var d = new Date(); 
        var hr = d.getHours(); 
        var min = d.getMinutes();
        document.getElementById("tx-time").value = (hr < 10 ? "0" + hr : hr) + ":" + (min < 10 ? "0" + min : min);
    }

    function modifyTime(mins) {
        var timeInput = document.getElementById("tx-time").value;
        var parts = timeInput.split(":");
        var totalMins = (parseInt(parts[0], 10) * 60) + parseInt(parts[1], 10) + mins;
        
        // คำนวณเวลาใหม่แบบวนลูป 24 ชม.
        totalMins = (totalMins + 1440) % 1440;
        var newH = Math.floor(totalMins / 60); 
        var newM = totalMins % 60;

        document.getElementById("tx-time").value = (newH < 10 ? "0" + newH : newH) + ":" + (newM < 10 ? "0" + newM : newM);
    }

    function addData() {
        var t = document.getElementById("tx-time").value; 
        var type = document.getElementById("tx-type").value; 
        var desc = document.getElementById("tx-desc").value;

        if(desc.trim() == "") { alert("CRITICAL ERROR: DATA INPUT INCOMPLETE!"); return; }

        listData.push({time: t, type: type, desc: desc.toUpperCase()});
        
        // เรียงลำดับตามเวลา
        listData.sort(function(a, b) { return a.time.localeCompare(b.time); });
        
        saveToStorage(); 
        document.getElementById("tx-desc").value = ""; 
        refreshTable();
    }

    function deleteData(index) { 
        if(confirm("TERMINATE THIS LOG ENTRY FROM CORE DATA?")) { 
            listData.splice(index, 1); 
            saveToStorage(); 
            refreshTable(); 
        } 
    }

    function setFilter(filterType) {
        currentFilter = filterType;
        // ปรับสีปุ่ม Filter
        ["ALL", "FOOD", "DRINK"].forEach(f => {
            var btn = document.getElementById("f-" + f.toLowerCase());
            if (btn) {
                btn.style.background = (filterType === f) ? "#00FF33" : "#001100";
                btn.style.color = (filterType === f) ? "#000" : "#00FF33";
            }
        });
        refreshTable();
    }

    function nuclearReset() { 
        if(confirm("⚠️ ALERT: CONFIRM COMPLETE OVERWRITE AND WIPE OF SYSTEM DATALOG?")) { 
            listData = []; 
            localStorage.removeItem("mil_log_data_v5");
            refreshTable(); 
        } 
    }

    function toggleExport() {
        var area = document.getElementById("export-output");
        if(area.style.display === "block") { area.style.display = "none"; } 
        else {
            area.value = listData.map(item => `[${item.time}] ${item.type} >> ${item.desc}`).join("\n") || "SYSTEM STORAGE IS EMPTY.";
            area.style.display = "block";
        }
    }

    function saveToStorage() { localStorage.setItem("mil_log_data_v5", JSON.stringify(listData)); }

    function refreshTable() {
        var tbody = document.getElementById("log-table-body");
        tbody.innerHTML = "";
        var foodCount = 0, drinkCount = 0;

        listData.forEach((item, i) => {
            if(item.type === "FOOD") foodCount++; 
            if(item.type === "DRINK") drinkCount++;

            if(currentFilter === "ALL" || item.type === currentFilter) {
                var row = `<tr>
                    <td style='text-align:center; font-weight:bold; color:#00FF33;'>${item.time}</td>
                    <td style='text-align:center; font-weight:bold; color:#00AA22;'>${item.type}</td>
                    <td style='color:#00FF33;'>${item.desc}</td>
                    <td style='text-align:center;'><button class='btn-del' onclick='deleteData(${i})'>X</button></td>
                </tr>`;
                tbody.innerHTML += row;
            }
        });
        document.getElementById("summary-text").innerHTML = `COUNTER // FOOD_UNIT: [${foodCount}] | DRINK_UNIT: [${drinkCount}]`;
    }
</script>
</body>
</html>
