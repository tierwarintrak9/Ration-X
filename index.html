<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL LOG</title>
    <style>
        /* ธีมทหารสีเขียวน้ำทะเล + กรอบปุ่มสีม่วงพิษ (Poison Purple) */
        body { 
            background-color: #2F4F4F; 
            color: #FFFFFF; 
            font-family: "Courier New", monospace; 
            text-transform: uppercase; 
            padding: 15px; 
            margin: 0; 
        }
        .box { 
            max-width: 500px; 
            margin: 0 auto; 
            background-color: #1A2B1A; 
            padding: 15px; 
            border: 3px solid #9D00FF; 
            border-radius: 4px; 
        }
        h1, h2 { 
            text-align: center; 
            color: #FFFFFF; 
            margin: 10px 0; 
            border-bottom: 2px solid #9D00FF; 
            padding-bottom: 5px; 
        }
        .date { 
            text-align: center; 
            color: #9D00FF; 
            font-weight: bold; 
            margin-bottom: 15px; 
        }
        .field { 
            margin-bottom: 12px; 
        }
        label { 
            display: block; 
            margin-bottom: 4px; 
            font-weight: bold; 
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            background-color: #000000; 
            color: #FFFFFF; 
            border: 1px solid #9D00FF; 
            font-family: "Courier New", monospace; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #4B5320; 
            color: #FFFFFF; 
            border: 3px solid #9D00FF; 
            font-family: "Courier New", monospace; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px; 
            text-transform: uppercase; 
        }
        button:active { 
            background-color: #9D00FF; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
        }
        th, td { 
            border: 1px solid #9D00FF; 
            padding: 8px; 
            text-align: left; 
            font-size: 14px; 
        }
        th { 
            background-color: #9D00FF; 
            color: #FFFFFF; 
            text-align: center; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>TACTICAL LOG</h1>
        <div id="date-text" class="date">LOADING...</div>
        
        <div class="field">
            <label>TIME (HH:MM):</label>
            <input type="text" id="tx-time" value="00:00">
        </div>
        <div class="field">
            <label>CATEGORY:</label>
            <select id="tx-type">
                <option value="FOOD">FOOD</option>
                <option value="DRINK">DRINK</option>
            </select>
        </div>
        <div class="field">
            <label>DESCRIPTION:</label>
            <input type="text" id="tx-desc" placeholder="REDBULL">
        </div>
        
        <button type="button" onclick="addData()">LOG ENTRY</button>
        
        <h2>DAILY LOGS</h2>
        <table>
            <thead>
                <tr>
                    <th style="width:25%">TIME</th>
                    <th style="width:25%">CAT</th>
                    <th>DETAILS</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                </tbody>
        </table>
    </div>

    <script>
        // ใช้ตัวแปร Array ธรรมดาในการคุมคลังข้อมูล
        var listData = [];

        window.onload = function() {
            // เซ็ตวันที่ภาษาอังกฤษแบบ Manual ป้องกันตระกูลเครื่องเก่าค้าง
            var d = new Date();
            var days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
            var months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            document.getElementById("date-text").innerHTML = days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();

            // เซ็ตเวลาปัจจุบันเข้าช่องอินพุตให้ทันที
            var hr = d.getHours();
            var min = d.getMinutes();
            if(hr < 10) hr = "0" + hr;
            if(min < 10) min = "0" + min;
            document.getElementById("tx-time").value = hr + ":" + min;

            // ดึงความจำเก่า (ถ้ามี)
            try {
                var cache = localStorage.getItem("mil_log_data");
                if(cache) {
                    listData = JSON.parse(cache);
                    refreshTable();
                }
            } catch(e) {}
        };

        function addData() {
            var t = document.getElementById("tx-time").value;
            var type = document.getElementById("tx-type").value;
            var desc = document.getElementById("tx-desc").value;

            if(t == "" || desc == "") {
                alert("ENTER ALL DETAILS FIRST!");
                return;
            }

            // บันทึกข้อมูลลง Array
            listData.push({
                time: t,
                type: type,
                desc: desc.toUpperCase()
            });

            // เรียงลำดับเวลา (เช้าไปเย็น)
            listData.sort(function(a, b) {
                return a.time.localeCompare(b.time);
            });

            // เซฟลงเครื่อง (ถ้าเปิด Privateโหมดจะเซฟไม่เข้า แต่หน้าจอจะยังแสดงผลให้)
            try {
                localStorage.setItem("mil_log_data", JSON.stringify(listData));
            } catch(e) {}

            // เคลียร์ช่องพิมพ์รายละเอียด
            document.getElementById("tx-desc").value = "";

            // สั่งอัปเดตตารางทันที
            refreshTable();
        }

        function refreshTable() {
            // ใช้วิธีต่อข้อความ (String Concatenation) แบบยุคเก่า เพื่อบังคับให้เบราว์เซอร์วาดใหม่ชัวร์ๆ
            var html = "";
            for(var i = 0; i < listData.length; i++) {
                html += "<tr>";
                html += "<td style='text-align:center; font-weight:bold;'>" + listData[i].time + "</td>";
                html += "<td style='text-align:center; font-weight:bold;'>" + listData[i].type + "</td>";
                html += "<td>" + listData[i].desc + "</td>";
                html += "</tr>";
            }
            document.getElementById("log-table-body").innerHTML = html;
        }
    </script>
</body>
</html>
