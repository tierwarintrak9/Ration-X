<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGHTYEARX-MOTOREX V5.1</title>
    <style>
        body { 
            background-color: #000500; 
            color: #00FF33; 
            font-family: "Courier New", monospace; 
            text-transform: uppercase; 
            padding: 5px; /* ลด padding เพื่อให้กว้างขึ้น */
            margin: 0;
            background-image: linear-gradient(rgba(0, 50, 0, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 50, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .box { 
            width: 100%; /* ปรับให้เต็มจอ */
            max-width: 100%;
            margin: 0 auto; 
            background-color: rgba(0, 8, 0, 0.95); 
            padding: 10px; 
            border: 2px solid #00FF33; 
            box-sizing: border-box;
            position: relative;
        }

        h1, h2 { text-align: center; color: #00FF33; margin: 5px 0; border-bottom: 2px dashed #00FF33; padding-bottom: 3px; font-size: 18px; }

        .status-bar {
            width: 100%;
            font-size: 10px;
            color: #00AA22;
            border-bottom: 1px solid #00FF33;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        
        /* เอฟเฟกต์เรืองแสงสถานะ */
        .status-right {
            float: right;
            color: #00FF33;
            font-weight: bold;
            text-shadow: 0 0 8px #00FF33;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .server-line {
            font-size: 10px;
            color: #00FF33;
            margin-top: 2px;
            padding-bottom: 5px;
            border-bottom: 1px dashed #004400;
        }

        .field { margin-bottom: 10px; border-left: 2px solid #00AA22; padding-left: 5px; }
        label { display: block; font-size: 10px; color: #00AA22; margin-bottom: 2px; }
        
        input, select { width: 100%; padding: 6px; background: #000; color: #00FF33; border: 1px solid #00AA22; font-family: inherit; box-sizing: border-box; }
        
        .btn-preset { display: inline-block; padding: 4px 6px; background: #001100; color: #00FF33; border: 1px solid #00AA22; font-size: 10px; cursor: pointer; margin-right: 2px; }
        
        button.btn-main { width: 100%; padding: 10px; background: #002200; color: #00FF33; border: 2px solid #00FF33; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 11px; }
        th { background: #002200; color: #00FF33; border: 1px solid #00AA22; padding: 4px; }
        td { border: 1px solid #00AA22; padding: 4px; color: #00FF33; text-align: center; }
        
        .btn-del { background: #220000; color: #FF3333; border: 1px solid #FF3333; cursor: pointer; padding: 2px 5px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="status-bar">
            <span style="float:left;">SYS.LOG // LIGHTYEARX-MOTOREX_BIONIC 5.1</span>
            <span class="status-right">● ONLINE</span>
        </div>
        <div class="server-line">[SYS.SRV] // [+66] THAILAND</div>

        <h1>TACTICAL COMS RATION LOG</h1>
        
        <div class="field">
            <label>[SYS.TIME] // INPUT CURRENT TIME</label>
            <input type="text" id="tx-time" value="00:00">
        </div>
        
        <div class="field">
            <label>[SYS.CAT] // SELECT DATA CATEGORY</label>
            <select id="tx-type">
                <option value="FOOD">FOOD (SUPPLY)</option>
                <option value="DRINK">DRINK (HYDRATION)</option>
            </select>
        </div>
        
        <div class="field">
            <label>[SYS.DESC] // ENTER FIELD DETAILS</label>
            <input type="text" id="tx-desc" placeholder="AWAITING INPUT...">
        </div>
        
        <button class="btn-main" onclick="addData()">EXECUTE LOG ENTRY</button>

        <h2>DAILY MONITOR LOGS</h2>
        <table id="log-table">
            <thead><tr><th>TIME</th><th>CAT</th><th>DATA</th><th>ACT</th></tr></thead>
            <tbody id="log-table-body"></tbody>
        </table>
    </div>

    <script>
        // โค้ด Logic คงเดิม (เรียกใช้ v5 ได้เลย)
        // อย่าลืมอัปเดตฟังก์ชัน refreshTable ให้แสดงข้อมูลตารางตามโครงสร้างใหม่นี้ครับ
        // (สามารถคงฟังก์ชันเดิมจากเวอร์ชันก่อนหน้าได้เลย)
    </script>
</body>
</html>
