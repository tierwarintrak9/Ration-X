<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGHTYEARX-MOTOREX V6</title>
    <style>
        body { 
            background-color: #000000; 
            color: #00FF33; 
            font-family: "Courier New", monospace; 
            margin: 0; padding: 10px;
        }

        .box { 
            width: 100%; 
            background-color: #000000; 
            border: 2px solid #00FF33; 
            padding: 15px; 
            box-sizing: border-box;
        }

        /* ขยายขนาดฟอนต์ให้ใหญ่ขึ้น */
        h1 { font-size: 24px; text-align: center; margin-bottom: 20px; }
        h2 { font-size: 20px; text-align: center; margin-top: 30px; }
        
        .status-bar { font-size: 14px; border-bottom: 1px solid #00FF33; padding-bottom: 10px; margin-bottom: 15px; }
        
        .field { margin-bottom: 25px; }
        label { display: block; font-size: 16px; margin-bottom: 10px; color: #00AA22; }
        
        /* Input & Select */
        input, select { 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            color: #00FF33; 
            border: 2px solid #00FF33; 
            font-size: 18px; 
            font-family: inherit;
            box-sizing: border-box;
            /* เอาแถบสีเทาออก */
            -webkit-appearance: none; 
            appearance: none;
        }

        button.btn-main { 
            width: 100%; 
            padding: 20px; 
            background: #00FF33; 
            color: #000; 
            border: none; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer;
            margin-top: 10px;
        }

        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th { font-size: 16px; border: 1px solid #00FF33; padding: 10px; background: #002200; }
        td { font-size: 16px; border: 1px solid #00FF33; padding: 10px; }
        
        .btn-del { background: #550000; color: #FF3333; padding: 10px; border: 1px solid #FF3333; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="status-bar">
            [SYS.SRV] // [+66] THAILAND <span style="float:right; color:#00FF33;">● ONLINE</span>
        </div>

        <h1>TACTICAL COMS RATION LOG</h1>
        
        <div class="field">
            <label>[SYS.TIME]</label>
            <input type="text" id="tx-time" value="02:28">
        </div>
        
        <div class="field">
            <label>[SYS.CAT]</label>
            <select id="tx-type">
                <option value="FOOD">FOOD (SUPPLY)</option>
                <option value="DRINK">DRINK (HYDRATION)</option>
            </select>
        </div>
        
        <div class="field">
            <label>[SYS.DESC]</label>
            <input type="text" id="tx-desc" placeholder="ENTER DATA...">
        </div>
        
        <button class="btn-main" onclick="addData()">EXECUTE LOG ENTRY</button>

        <h2>DAILY MONITOR LOGS</h2>
        <table id="log-table">
            <thead><tr><th>TIME</th><th>CAT</th><th>DATA</th><th>ACT</th></tr></thead>
            <tbody id="log-table-body"></tbody>
        </table>
    </div>

    <script>
        // ใช้ Logic เดิมในการบันทึก แต่แก้การแสดงผลใน refreshTable ให้รองรับขนาดฟอนต์ใหม่
        function addData() {
            var t = document.getElementById("tx-time").value;
            var type = document.getElementById("tx-type").value;
            var desc = document.getElementById("tx-desc").value;
            
            var listData = JSON.parse(localStorage.getItem("mil_log_data_v5") || "[]");
            listData.push({time: t, type: type, desc: desc.toUpperCase()});
            localStorage.setItem("mil_log_data_v5", JSON.stringify(listData));
            
            document.getElementById("tx-desc").value = "";
            refreshTable();
        }

        function refreshTable() {
            var listData = JSON.parse(localStorage.getItem("mil_log_data_v5") || "[]");
            var html = "";
            for(var i=0; i<listData.length; i++) {
                html += "<tr><td>"+listData[i].time+"</td><td>"+listData[i].type+"</td><td>"+listData[i].desc+"</td><td><button class='btn-del' onclick='deleteData("+i+")'>X</button></td></tr>";
            }
            document.getElementById("log-table-body").innerHTML = html;
        }

        function deleteData(index) {
            var listData = JSON.parse(localStorage.getItem("mil_log_data_v5") || "[]");
            listData.splice(index, 1);
            localStorage.setItem("mil_log_data_v5", JSON.stringify(listData));
            refreshTable();
        }
        
        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        refreshTable();
    </script>
</body>
</html>
