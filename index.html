<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL RATION LOG</title>
    <style>
        /* ตั้งค่าธีมการทหาร: พื้นหลังสีเขียวน้ำทะเล/เขียวทหาร อักษรสีขาว */
        body {
            background-color: #2F4F4F; /* Dark Slate Gray / Sea Green */
            color: #FFFFFF;
            font-family: "Courier New", Courier, monospace;
            text-transform: uppercase;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            text-align: center;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #223322;
            padding: 20px;
            border: 2px solid #FFD700; /* กรอบสีทอง */
            border-radius: 5px;
        }

        .date-display {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFD700;
        }

        /* ตั้งค่าฟอร์ม */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* ตั้งค่าขนาดฟอนต์ 16px ขึ้นไป เพื่อป้องกัน iOS ซูมหน้าจอเมื่อกดพิมพ์ */
        input[type="time"],
        select,
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #1A2B1A;
            color: #FFFFFF;
            border: 1px solid #FFD700;
            font-family: "Courier New", Courier, monospace;
            font-size: 16px; 
            box-sizing: border-box;
            text-transform: uppercase;
        }

        /* ปุ่มกดกรอบสีทอง */
        button {
            width: 100%;
            padding: 15px;
            background-color: #4B5320; /* Army Green */
            color: #FFFFFF;
            border: 3px solid #FFD700;
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:active {
            background-color: #FFD700;
            color: #000000;
        }

        /* ส่วนแสดงผลการบันทึก */
        .log-section {
            margin-top: 30px;
        }

        .log-entry {
            background-color: #1A2B1A;
            border-left: 5px solid #FFD700;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .log-time {
            color: #FFD700;
            font-weight: bold;
            margin-right: 10px;
        }

        .log-type {
            background-color: #FFFFFF;
            color: #000000;
            padding: 2px 5px;
            margin-right: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TACTICAL RATION LOG</h1>
        
        <div id="current-date" class="date-display">LOADING DATE...</div>

        <div class="form-group">
            <label for="time">TIME (HOURS):</label>
            <input type="time" id="time" required>
        </div>

        <div class="form-group">
            <label for="type">CATEGORY:</label>
            <select id="type">
                <option value="FOOD">FOOD (MRE/MEAL)</option>
                <option value="DRINK">DRINK (HYDRATION)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="desc">DESCRIPTION:</label>
            <input type="text" id="desc" placeholder="ENTER RATION DETAILS..." autocomplete="off">
        </div>

        <button onclick="saveLog()">LOG ENTRY</button>

        <div class="log-section">
            <h2>DAILY LOGS</h2>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        // ใช้ JavaScript ES5 เพื่อให้รองรับ iOS 9.3.6 
        
        // ฟังก์ชันสำหรับแสดงวันและวันที่ปัจจุบันเป็นภาษาอังกฤษ
        function displayCurrentDate() {
            var dateDisplay = document.getElementById('current-date');
            var today = new Date();
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            // แปลงเป็นภาษาอังกฤษและพิมพ์ใหญ่ทั้งหมด
            dateDisplay.innerText = today.toLocaleDateString('en-US', options).toUpperCase();
        }

        // ฟังก์ชันโหลดข้อมูลจาก LocalStorage
        function loadLogs() {
            var logContainer = document.getElementById('log-container');
            logContainer.innerHTML = ''; 
            
            // ใช้ Date เป็น key เพื่อรีเซ็ตข้อมูลใหม่ทุกวัน (ดึงเฉพาะของวันนี้)
            var todayKey = new Date().toDateString();
            var savedLogs = localStorage.getItem('rationLogs_' + todayKey);
            var logs = savedLogs ? JSON.parse(savedLogs) : [];

            for (var i = 0; i < logs.length; i++) {
                var entryDiv = document.createElement('div');
                entryDiv.className = 'log-entry';
                
                var timeSpan = '<span class="log-time">[' + logs[i].time + ']</span>';
                var typeSpan = '<span class="log-type">' + logs[i].type + '</span>';
                var descSpan = '<span>' + logs[i].desc + '</span>';
                
                entryDiv.innerHTML = timeSpan + typeSpan + descSpan;
                logContainer.appendChild(entryDiv);
            }
        }

        // ฟังก์ชันบันทึกข้อมูลลง LocalStorage
        function saveLog() {
            var timeInput = document.getElementById('time').value;
            var typeInput = document.getElementById('type').value;
            var descInput = document.getElementById('desc').value;

            if (timeInput === '' || descInput === '') {
                alert('COMMAND: PLEASE FILL IN ALL FIELDS.');
                return;
            }

            var newEntry = {
                time: timeInput,
                type: typeInput,
                desc: descInput.toUpperCase()
            };

            var todayKey = new Date().toDateString();
            var savedLogs = localStorage.getItem('rationLogs_' + todayKey);
            var logs = savedLogs ? JSON.parse(savedLogs) : [];
            
            logs.push(newEntry);
            
            // เรียงลำดับตามเวลา
            logs.sort(function(a, b) {
                return a.time.localeCompare(b.time);
            });

            localStorage.setItem('rationLogs_' + todayKey, JSON.stringify(logs));

            // เคลียร์ช่องพิมพ์และรีเฟรชรายการ
            document.getElementById('desc').value = '';
            loadLogs();
        }

        // เซ็ตเวลาปัจจุบันให้ช่อง Time ตอนเปิดหน้าเว็บ
        function setCurrentTime() {
            var now = new Date();
            var hours = String(now.getHours());
            if (hours.length < 2) hours = '0' + hours;
            var minutes = String(now.getMinutes());
            if (minutes.length < 2) minutes = '0' + minutes;
            document.getElementById('time').value = hours + ':' + minutes;
        }

        // เริ่มการทำงานเมื่อหน้าเว็บโหลดเสร็จ
        window.onload = function() {
            displayCurrentDate();
            setCurrentTime();
            loadLogs();
        };
    </script>
</body>
</html>
