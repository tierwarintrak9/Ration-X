<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIGHTYEARX-MOTOREX V5</title>
    <style>
        body { 
            background-color: #000500; 
            color: #00FF33; 
            font-family: "Courier New", monospace; 
            text-transform: uppercase; 
            padding: 10px; 
            margin: 0;
            background-image: linear-gradient(rgba(0, 50, 0, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 50, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .box { 
            width: 100%; 
            max-width: 100%;
            margin: 0; 
            background-color: rgba(0, 8, 0, 0.9); 
            padding: 15px; 
            border: 2px solid #00FF33; 
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.2);
        }
        
        .box::before {
            content: "[ OPERATIONAL HUD ]";
            position: absolute;
            top: -12px;
            left: 20px;
            background: #000500;
            padding: 0 5px;
            font-size: 10px;
            color: #00FF33;
            letter-spacing: 2px;
            z-index: 10;
        }

        h1, h2 { text-align: center; color: #00FF33; margin: 10px 0; border-bottom: 2px dashed #00FF33; padding-bottom: 5px; font-size: 20px; }
        .status-bar { width: 100%; font-size: 11px; color: #00AA22; border-bottom: 1px solid #00FF33; padding-bottom: 6px; margin-bottom: 12px; }
        .status-left { float: left; }
        .status-right { float: right; color: #00FF33; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1.0; } 50% { opacity: 0.3; } 100% { opacity: 1.0; } }
        
        .date { text-align: center; color: #00FF33; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        .field { margin-bottom: 14px; border-left: 3px solid #00AA22; padding-left: 8px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #00AA22; font-size: 12px; }
        
        input, select { width: 100%; padding: 8px; background-color: #000000; color: #00FF33; border: 1px solid #00AA22; font-family: "Courier New", monospace; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; appearance: none; }
        select option { background-color: #000; color: #00FF33; }

        .btn-preset { display: inline-block; padding: 5px 8px; background-color: #001100; color: #00FF33; border: 1px solid #00AA22; font-size: 11px; font-weight: bold; margin: 2px; cursor: pointer; }
        button.btn-main { width: 100%; padding: 12px; background-color: #002200; color: #00FF33; border: 2px solid #00FF33; font-family: inherit; font-weight: bold; margin-top: 5px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px solid #00AA22; padding: 8px; text-align: center; font-size: 12px; word-wrap: break-word; }
        
        .btn-del { background-color: #220000; color: #FF3333; border: 1px solid #FF3333; padding: 2px 6px; cursor: pointer; }
        .control-zone { margin-top: 20px; border-top: 2px double #00FF33; padding-top: 15px; display: flex; gap: 10px; }
        .btn-danger, .btn-utility { flex: 1; padding: 10px; font-family: inherit; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <div class="status-bar">
            <div class="status-left">SYS.LOG // LIGHTYEARX-MOTOREX_BIONIC 5.4</div>
            <div class="status-right">● ONLINE</div>
            <div style="clear:both;"></div>
        </div>

        <h1>TACTICAL COMS RATION LOG</h1>
        <div id="date-text" class="date"></div>
        
        <div class="field">
            <label>[SYS.TIME]</label>
            <input type="text" id="tx-time" value="00:00">
        </div>
        
        <div class="field">
            <label>[SYS.CAT]</label>
            <select id="tx-type">
                <option value="FOOD">FOOD (SUPPLY)</option>
                <option value="DRINK">DRINK (HYDRATION)</option>
            </select>
        </div>
        
        <div class="field">
            <label>[SYS.DESC]</label>
            <input type="text" id="tx-desc" placeholder="AWAITING INPUT...">
        </div>
        
        <button type="button" class="btn-main" onclick="addData()">EXECUTE LOG ENTRY</button>
        
        <div class="summary-box" id="summary-text" style="text-align:center; margin-top:10px; color:#00FF33;">COUNTER // FOOD: [0] | DRINK: [0]</div>

        <h2>DAILY MONITOR LOGS</h2>
        <table>
            <thead><tr><th>TIME</th><th>CAT</th><th>DATA</th><th>ACT</th></tr></thead>
            <tbody id="log-table-body"></tbody>
        </table>

        <div class="control-zone">
            <button type="button" class="btn-danger" onclick="nuclearReset()">CORE WIPEOUT</button>
            <button type="button" class="btn-utility" onclick="toggleExport()">DUMP DATALOG</button>
        </div>
        <textarea id="export-output" style="width:100%; height:80px; background:#000; color:#00FF33; margin-top:10px; display:none;"></textarea>
    </div>

    <script>
        var listData = JSON.parse(localStorage.getItem("mil_log_data_v5") || "[]");
        function addData() {
            var t = document.getElementById("tx-time").value;
            var type = document.getElementById("tx-type").value;
            var desc = document.getElementById("tx-desc").value;
            listData.push({time: t, type: type, desc: desc.toUpperCase()});
            localStorage.setItem("mil_log_data_v5", JSON.stringify(listData));
            document.getElementById("tx-desc").value = "";
            refreshTable();
        }
        function refreshTable() {
            var html = "", f = 0, d = 0;
            listData.forEach((item, i) => {
                if(item.type === "FOOD") f++; else d++;
                html += "<tr><td>"+item.time+"</td><td>"+item.type+"</td><td>"+item.desc+"</td><td><button class='btn-del' onclick='del("+i+")'>X</button></td></tr>";
            });
            document.getElementById("log-table-body").innerHTML = html;
            document.getElementById("summary-text").innerHTML = "COUNTER // FOOD: ["+f+"] | DRINK: ["+d+"]";
        }
        function del(i) { listData.splice(i, 1); localStorage.setItem("mil_log_data_v5", JSON.stringify(listData)); refreshTable(); }
        function nuclearReset() { listData = []; localStorage.clear(); refreshTable(); }
        function toggleExport() { var area = document.getElementById("export-output"); area.style.display = (area.style.display === "block") ? "none" : "block"; area.value = JSON.stringify(listData); }
        window.onload = function() { refreshTable(); document.getElementById("date-text").innerHTML = new Date().toDateString().toUpperCase(); }
    </script>
</body>
</html>
